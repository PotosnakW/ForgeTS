# General
model_type: transformer
tokenizer: fixed_patch
encoder: google/t5-efficient-tiny  # Transformer backbone to use, e.g., google/t5-efficient-tiny
decoder: none
output_layer: linear_proj   # not linear_projection

context_len: 512
d_model: 256  # Dimension of the model, should be 256 for T5-tiny
pe_type: 'sincos'
learn_pe: False
patch_len: 8
stride: 1
hidden_size: 256
n_layers: 4
n_heads: 4
linear_hidden_size: 1024
dropout: 0.1
head_dropout: False
revin: True
revin_affine: False
revin_subtract_last: False
# TST Encoder params
d_k: 32
d_v: 32
qkv_bias: False
attn_dropout: False
proj_dropout: 0.0
norm: "BatchNorm"
activation: 'gelu'
pre_norm: False
store_attn: False

# MICA variants
mica_mixer_type: betas # betas, mlp, mlp_query
mica_channel_weight_type: uniform # uniform, static, dynamic
mica_channel_exclusion: False
layerwise_beta: False
channelwise_beta: False
mlpmixer_hidden_size: 128
mlpmixer_n_layers: 3
mlpmixer_dropout: 0.1
