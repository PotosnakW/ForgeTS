# General
model_type: transformer
encoder: google/t5-efficient-tiny  # Transformer backbone to use, e.g., google/t5-efficient-tiny
decoder: none
output_layer: linear_proj   # not linear_projection

d_model: 256  # Dimension of the model, should be 256 for T5-tiny
pe_type: 'sincos'
learn_pe: False
patch_len: 8
stride: 1
hidden_size: 256
n_layers: 4
n_heads: 4
linear_hidden_size: 1024
dropout: 0.1
head_dropout: False
revin: True
revin_affine: False
revin_subtract_last: False
# TST Encoder params
d_k: 32
d_v: 32
qkv_bias: False
attn_dropout: False
proj_dropout: 0.0
norm: "BatchNorm"
activation: 'gelu'
pre_norm: False
store_attn: False

# MICA variants
infini_mixer_type: none
