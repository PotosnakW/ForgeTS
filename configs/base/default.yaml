# ── Random seed ────────────────────────────────────────────
seed: 1

# ── Scaling ────────────────────────────────────────────
scaler_type: 'standard'

# ── Loss ────────────────────────────────────────────
loss_space: 'denorm' #'denorm'

# ── DataLoader ──────────────────────────────────────────
batch_size: 4
valid_batch_size: 4
num_workers: 4
drop_last: false
lazy_loading: true        # True: datasets loaded on-demand, max_cached_datasets held in RAM at once; False: all datasets loaded into RAM at startup
max_cached_datasets: 10   # (lazy_loading=True only) max datasets held in memory simultaneously; LRU eviction when exceeded
batch_sampler: HorizonBatchSampler 
batch_mixing_strategy: concat # Options: concat, round_robin
val_strategy: "exhaustive"  # full pass every val check (default)
                            # val_strategy: "random_datasets"   # option A — K random datasets per val check
                            # val_max_datasets: 4               # Only used for val_strategy "random_datasets"
                            # val_strategy: "stratified"        # option C — one random item per horizon group


# ── Training ──────────────────────────────────────────────────
max_steps: 50           # total optimiser steps (replaces max_epochs)
val_check_interval: 10      # run validation every N steps
early_stopping_patience: 10   # number of val checks without improvement before stopping
learning_rate: 1e-4
fcd_samples: 10 # 1 for windows-sampling and >1 for forking-sequences
fcd_sampler: heterogeneous
loss: "quantile"
quantiles: [0.1, 0.5, 0.9]
gradient_clip_val: 1.0
optimizer_name: "AdamW"

# ── Checkpointing ─────────────────────────────────────────────
checkpoint_dir: "checkpoints/"
checkpoint_step: 4000
